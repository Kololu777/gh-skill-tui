name: Latest Changes

# The permanent release branch is the integration hub. Main only advances when
# a tested release candidate is merged, so unqualified Nix flake runs stay on
# the latest published source.
on:
  pull_request_target:
    branches:
      - release
    types:
      - closed
  workflow_dispatch:
    inputs:
      number:
        description: PR number
        required: true

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-hub-writes
  cancel-in-progress: false

jobs:
  latest-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          ref: release
          persist-credentials: true

      - name: Update release notes
        uses: tiangolo/latest-changes@0.6.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          latest_changes_file: release-notes.md
          latest_changes_header: "## Latest Changes"
          end_regex: "^## "
