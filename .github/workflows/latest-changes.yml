name: Latest Changes

# Entries are recorded on develop only: the main-required-checks ruleset
# rejects direct bot pushes to main, and every change reaches main through a
# develop -> main (or release -> main) PR anyway.
on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      number:
        description: PR number
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  latest-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          ref: develop

      - name: Update release notes
        uses: tiangolo/latest-changes@0.6.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          latest_changes_file: release-notes.md
          latest_changes_header: "## Latest Changes"
          end_regex: "^## "
