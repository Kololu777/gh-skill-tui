name: Latest Changes

on:
  pull_request_target:
    branches:
      - main
      - develop
    types:
      - closed
  workflow_dispatch:
    inputs:
      number:
        description: PR number
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  latest-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          # Write the entry onto the branch the PR merged into; fall back to
          # the default branch for manual workflow_dispatch runs.
          ref: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}

      - name: Update release notes
        uses: tiangolo/latest-changes@0.6.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          latest_changes_file: release-notes.md
          latest_changes_header: '## Latest Changes'
          end_regex: '^## '
