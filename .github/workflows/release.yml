name: Publish Release

# A manual Prepare Release dispatch creates a temporary release-vX.Y.Z-* branch
# and a PR to main. Required PR checks are the release gate. Once GitHub merges
# that PR, this workflow tags the exact merge commit, publishes extension
# binaries, synchronizes the release hub, and removes the temporary branch.
on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions: {}

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  prepare:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release') &&
      startsWith(github.event.pull_request.head.ref, 'release-v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    outputs:
      branch: ${{ steps.details.outputs.branch }}
      sha: ${{ steps.details.outputs.sha }}
      tag: ${{ steps.details.outputs.tag }}
      version: ${{ steps.details.outputs.version }}
    steps:
      - name: Check out the tested merge commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Read and validate release details
        id: details
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          version="$(go run ./cmd/prepare-release current-version)"
          tag="v${version}"
          case "$HEAD_BRANCH" in
            "release-${tag}-"*) ;;
            *)
              echo "candidate branch $HEAD_BRANCH does not match version $tag" >&2
              exit 1
              ;;
          esac
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}"; then
            echo "tag $tag already exists" >&2
            exit 1
          fi
          {
            echo "branch=$HEAD_BRANCH"
            echo "sha=$MERGE_SHA"
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Create the tag and draft release
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ steps.details.outputs.sha }}
          TAG: ${{ steps.details.outputs.tag }}
          VERSION: ${{ steps.details.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$MERGE_SHA" -m "Release $TAG"
          git push origin "$TAG"
          go run ./cmd/prepare-release release-notes --version "$VERSION" \
            > "$RUNNER_TEMP/release-notes.md"
          gh release create "$TAG" \
            --draft \
            --verify-tag \
            --target "$MERGE_SHA" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

  extension-assets:
    name: Build extension assets
    needs:
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build and validate extension binaries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            GOOS="${target%%-*}" GOARCH="${target##*-}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
              -o "dist/gh-skill-tui_v${VERSION}_${target}" .
          done
          binary="dist/gh-skill-tui_v${VERSION}_linux-amd64"
          got="$("$binary" --version)"
          test "$got" = "gh-skill-tui version $VERSION"
          assets=(dist/gh-skill-tui_*)
          sha256sum "${assets[@]}" > dist/checksums.txt

      - name: Upload assets to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release upload "$TAG" dist/*

  publish:
    needs:
      - prepare
      - extension-assets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish the completed release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --draft=false --latest

  sync-release-hub:
    needs:
      - prepare
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Fast-forward release and delete the candidate branch
        env:
          BRANCH: ${{ needs.prepare.outputs.branch }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch origin release
          git merge-base --is-ancestor origin/release "$RELEASE_SHA"
          git push origin "$RELEASE_SHA:refs/heads/release"
          if git ls-remote --exit-code --heads origin "refs/heads/$BRANCH"; then
            git push origin --delete "$BRANCH"
          fi

  verify-extension-install:
    name: Verify gh extension install
    needs:
      - prepare
      - publish
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Install the published extension and check its version
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          gh extension install "$GITHUB_REPOSITORY"
          got="$(gh skill-tui --version)"
          echo "$got"
          test "$got" = "gh-skill-tui version $VERSION"
