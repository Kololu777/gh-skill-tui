version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    target-branch: release
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: release
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
