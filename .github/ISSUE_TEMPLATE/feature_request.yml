name: 機能提案
description: 改善案や新機能を提案する
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どのような場面で困っているかを記載してください。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 望ましい解決方法や画面・CLI の変更案を記載してください。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 検討した別の方法があれば記載してください。

  - type: textarea
    id: additional-context
    attributes:
      label: 補足情報
      description: 参考資料、モック、スクリーンショットなどがあれば追加してください。
