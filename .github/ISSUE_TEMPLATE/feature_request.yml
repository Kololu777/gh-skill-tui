name: Feature request
description: Propose an improvement or a new feature
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the situation you are struggling with.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired solution or the UI / CLI changes you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches you considered, if any.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: References, mockups, screenshots, and so on.
