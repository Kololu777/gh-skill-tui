name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please describe the reproduction steps and your environment as concretely as possible.

  - type: textarea
    id: description
    attributes:
      label: Summary
      description: Describe what happened and what you expected to happen.
      placeholder: |
        Expected behavior:
        Actual behavior:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide minimal reproduction steps or commands.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 / abc1234
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go, gh, and the agents you use.
      placeholder: |
        OS: Ubuntu 24.04
        Go: 1.22.x
        gh: x.y.z
        agent: Codex
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste them after removing any secrets.
      render: shell
